# Pharma Agentic AI — Kubernetes Deployment Manifests
# Production deployment for Azure Kubernetes Service (AKS)

---
# ── Namespace ─────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: pharma-ai
  labels:
    app.kubernetes.io/name: pharma-agentic-ai
    environment: production

---
# ── Planner Agent ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: planner-agent
  namespace: pharma-ai
  labels:
    app: planner-agent
    component: agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: planner-agent
  template:
    metadata:
      labels:
        app: planner-agent
        component: agent
    spec:
      containers:
        - name: planner
          image: pharmaai.azurecr.io/planner-agent:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          envFrom:
            - secretRef:
                name: pharma-ai-secrets
            - configMapRef:
                name: pharma-ai-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: planner-agent
  namespace: pharma-ai
spec:
  selector:
    app: planner-agent
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

---
# ── Supervisor Agent ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: supervisor-agent
  namespace: pharma-ai
  labels:
    app: supervisor-agent
    component: agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: supervisor-agent
  template:
    metadata:
      labels:
        app: supervisor-agent
        component: agent
    spec:
      containers:
        - name: supervisor
          image: pharmaai.azurecr.io/supervisor-agent:latest
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          envFrom:
            - secretRef:
                name: pharma-ai-secrets
            - configMapRef:
                name: pharma-ai-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 30

---
# ── Executor Agent ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: executor-agent
  namespace: pharma-ai
  labels:
    app: executor-agent
    component: agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: executor-agent
  template:
    metadata:
      labels:
        app: executor-agent
        component: agent
    spec:
      containers:
        - name: executor
          image: pharmaai.azurecr.io/executor-agent:latest
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          envFrom:
            - secretRef:
                name: pharma-ai-secrets
            - configMapRef:
                name: pharma-ai-config

---
# ── Retriever Workers (ScaledObject via KEDA) ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retriever-workers
  namespace: pharma-ai
  labels:
    app: retriever-workers
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retriever-workers
  template:
    metadata:
      labels:
        app: retriever-workers
        component: worker
    spec:
      containers:
        - name: worker
          image: pharmaai.azurecr.io/retriever-worker:latest
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          envFrom:
            - secretRef:
                name: pharma-ai-secrets
            - configMapRef:
                name: pharma-ai-config

---
# ── Frontend ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pharma-ai
  labels:
    app: frontend
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        component: web
    spec:
      containers:
        - name: frontend
          image: pharmaai.azurecr.io/frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: pharma-ai-config
                  key: API_BASE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: pharma-ai
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

---
# ── Ingress ───────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pharma-ai-ingress
  namespace: pharma-ai
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - pharma-ai.example.com
      secretName: pharma-ai-tls
  rules:
    - host: pharma-ai.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: planner-agent
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000

---
# ── ConfigMap ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: pharma-ai-config
  namespace: pharma-ai
data:
  APP_ENV: "production"
  APP_LOG_LEVEL: "INFO"
  API_BASE_URL: "https://pharma-ai.example.com/api"
  REDIS_SSL: "true"
  POSTGRES_SSL_MODE: "require"
  TELEMETRY_USE_AZURE_MONITOR: "true"
  WEB_PUBSUB_USE_AZURE: "true"
  GREMLIN_USE_GREMLIN: "true"
