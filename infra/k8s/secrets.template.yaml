# Pharma Agentic AI — Secrets Template
# Copy to k8s/secrets.yaml and fill in real values before deployment.
# NEVER commit real secrets to version control.

apiVersion: v1
kind: Secret
metadata:
  name: pharma-ai-secrets
  namespace: pharma-ai
type: Opaque
stringData:
  # ── Azure OpenAI ──────────────────────────────────────
  AZURE_OPENAI_ENDPOINT: "https://pharmaai-prod-openai.openai.azure.com"
  AZURE_OPENAI_API_KEY: "<REPLACE_ME>"
  AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4o"

  # ── Cosmos DB ─────────────────────────────────────────
  COSMOS_DB_ENDPOINT: "https://pharmaai-prod-cosmos.documents.azure.com:443/"
  COSMOS_DB_KEY: "<REPLACE_ME>"

  # ── Service Bus ───────────────────────────────────────
  SERVICE_BUS_CONNECTION_STRING: "<REPLACE_ME>"

  # ── Key Vault ─────────────────────────────────────────
  KEY_VAULT_URL: "https://pharmaai-prod-kv.vault.azure.net/"

  # ── Blob Storage ──────────────────────────────────────
  BLOB_STORAGE_CONNECTION_STRING: "<REPLACE_ME>"

  # ── AI Search ─────────────────────────────────────────
  AI_SEARCH_ENDPOINT: "https://pharmaai-prod-search.search.windows.net"
  AI_SEARCH_API_KEY: "<REPLACE_ME>"

  # ── Redis ─────────────────────────────────────────────
  REDIS_URL: "rediss://:ACCESS_KEY@pharmaai-prod-redis.redis.cache.windows.net:6380/0"

  # ── PostgreSQL ────────────────────────────────────────
  POSTGRES_URL: "postgresql://pharma:PASSWORD@pharmaai-prod-pg.postgres.database.azure.com:5432/pharma_ai?sslmode=require"

  # ── AI Language (NER) ─────────────────────────────────
  AI_LANGUAGE_ENDPOINT: "https://pharmaai-prod-language.cognitiveservices.azure.com"
  AI_LANGUAGE_API_KEY: "<REPLACE_ME>"

  # ── Web PubSub ────────────────────────────────────────
  WEB_PUBSUB_CONNECTION_STRING: "<REPLACE_ME>"

  # ── Cosmos Gremlin ────────────────────────────────────
  GREMLIN_ENDPOINT: "pharmaai-prod-cosmos.gremlin.cosmos.azure.com"
  GREMLIN_KEY: "<REPLACE_ME>"

  # ── Telemetry ─────────────────────────────────────────
  TELEMETRY_APPLICATION_INSIGHTS_CONNECTION_STRING: "<REPLACE_ME>"

  # ── Tavily (Web Search) ───────────────────────────────
  TAVILY_API_KEY: "<REPLACE_ME>"
