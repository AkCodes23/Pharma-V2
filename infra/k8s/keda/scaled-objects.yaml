# ============================================================
# Pharma Agentic AI — KEDA ScaledObjects
# ============================================================
# Event-driven autoscaling for retriever agents.
#
# Supports two trigger modes (selected via env):
#   - Kafka: Direct Kafka topic lag (local dev)
#   - Azure Event Hubs: Event Hubs consumer group lag (production)
#
# Toggle: Set KAFKA_USE_EVENT_HUBS=true and provide
# KAFKA_EVENT_HUBS_CONNECTION_STRING in the deployment config.
# ============================================================

# ── Retriever: Legal ────────────────────────────────────────
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: retriever-legal-scaler
  namespace: pharma-ai
spec:
  scaleTargetRef:
    name: retriever-legal
  minReplicaCount: 0
  maxReplicaCount: 10
  pollingInterval: 15
  cooldownPeriod: 120
  triggers:
    - type: azure-eventhub
      metadata:
        connectionFromEnv: KAFKA_EVENT_HUBS_CONNECTION_STRING
        consumerGroup: retriever-legal-group
        eventHubNamespace: pharma-events
        eventHubName: pharma.tasks.legal
        unprocessedEventThreshold: "5"
        blobContainer: keda-checkpoints
      authenticationRef:
        name: keda-eventhub-auth
---

