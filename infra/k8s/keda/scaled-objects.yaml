# ── Celery Workers ───────────────────────────────────────────
# Celery workers scale on Azure Service Bus queue length
# (if Celery broker is swapped to SB) or Redis list length.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: celery-worker-scaler
  namespace: pharma-ai
spec:
  scaleTargetRef:
    name: celery-worker
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 30
  triggers:
    - type: azure-servicebus
      metadata:
        queueName: pharma.pdf
        messageCount: "3"
        connectionFromEnv: SERVICE_BUS_CONNECTION_STRING
    - type: azure-servicebus
      metadata:
        queueName: pharma.rag
        messageCount: "3"
        connectionFromEnv: SERVICE_BUS_CONNECTION_STRING
---

# ── KEDA TriggerAuthentication ───────────────────────────────
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-eventhub-auth
  namespace: pharma-ai
spec:
  secretTargetRef:
    - parameter: connection
      name: eventhub-secrets
      key: connection-string
