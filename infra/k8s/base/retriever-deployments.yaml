# ============================================================
# Pharma Agentic AI — K8s Retriever Deployments
# ============================================================
# Standardized deployment template for all 6 retriever agents.
# Each retriever subscribes to a specific Service Bus topic
# and processes tasks for its pillar.
# ============================================================

# ── Retriever: Legal ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retriever-legal
  namespace: pharma-ai
  labels:
    app: retriever-legal
    tier: worker
    pillar: legal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retriever-legal
  template:
    metadata:
      labels:
        app: retriever-legal
        tier: worker
        pillar: legal
    spec:
      containers:
        - name: retriever-legal
          image: pharma-ai/retriever-legal:latest
          envFrom:
            - configMapRef:
                name: pharma-config
          env:
            - name: PILLAR
              value: "LEGAL"
            - name: SERVICE_BUS_SUBSCRIPTION
              value: "retriever-legal-sub"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
