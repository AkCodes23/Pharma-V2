# ============================================================
# Pharma Agentic AI — Kustomization
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pharma-ai

resources:
  - namespace.yaml
  - configmap.yaml
  - planner-deployment.yaml
  - supervisor-deployment.yaml
  - executor-deployment.yaml
  - retriever-deployments.yaml
  - supporting-deployments.yaml
  - policies.yaml

commonLabels:
  project: pharma-agentic-ai
  managed-by: kustomize
