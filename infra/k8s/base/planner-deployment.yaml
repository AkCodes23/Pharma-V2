apiVersion: apps/v1
kind: Deployment
metadata:
  name: planner
  namespace: pharma-ai
  labels:
    app: planner
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: planner
  template:
    metadata:
      labels:
        app: planner
        tier: api
    spec:
      containers:
        - name: planner
          image: pharma-ai/planner:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: pharma-config
            - secretRef:
                name: pharma-ai-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: planner-service
  namespace: pharma-ai
spec:
  selector:
    app: planner
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: planner-hpa
  namespace: pharma-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: planner
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
