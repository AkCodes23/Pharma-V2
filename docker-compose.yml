services:
  postgres:
    image: postgres:16-alpine
    container_name: pharma-postgres
    environment:
      POSTGRES_DB: pharma_ai
      POSTGRES_USER: pharma
      POSTGRES_PASSWORD: pharma_pg_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma -d pharma_ai"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pharma-demo

  redis:
    image: redis:7-alpine
    container_name: pharma-redis
    command: ["redis-server", "--save", "60", "1000", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pharma-demo

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: pharma-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pharma-demo

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pharma-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - pharma-demo

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pharma-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic legal-tasks
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic clinical-tasks
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic commercial-tasks
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic social-tasks
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic knowledge-tasks
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic news-tasks
      "
    networks:
      - pharma-demo

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: pharma-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - pharma-demo

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    container_name: pharma-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      until mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin}; do sleep 1; done
      mc mb --ignore-existing local/${MINIO_BUCKET:-reports}
      "
    networks:
      - pharma-demo

  planner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharma-planner
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      supervisor:
        condition: service_started
      executor:
        condition: service_started
    command: uvicorn src.agents.planner.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - pharma-demo

  supervisor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharma-supervisor
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    command: uvicorn src.agents.supervisor.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health').raise_for_status()"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - pharma-demo

  executor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharma-executor
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    command: uvicorn src.agents.executor.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8002/health').raise_for_status()"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - pharma-demo

  retriever-legal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharma-retriever-legal
    env_file:
      - .env
    command: python -m src.agents.retrievers.legal.main
    environment:
      SERVICE_BUS_SUBSCRIPTION: retriever-legal-sub
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - pharma-demo

  retriever-clinical:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharma-retriever-clinical
    env_file:
      - .env
    command: python -m src.agents.retrievers.clinical.main
    environment:
      SERVICE_BUS_SUBSCRIPTION: retriever-clinical-sub
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - pharma-demo

  retriever-commercial:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharma-retriever-commercial
    env_file:
      - .env
    command: python -m src.agents.retrievers.commercial.main
    environment:
      SERVICE_BUS_SUBSCRIPTION: retriever-commercial-sub
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - pharma-demo

  retriever-social:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharma-retriever-social
    env_file:
      - .env
    command: python -m src.agents.retrievers.social.main
    environment:
      SERVICE_BUS_SUBSCRIPTION: retriever-social-sub
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - pharma-demo

  retriever-knowledge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharma-retriever-knowledge
    env_file:
      - .env
    command: python -m src.agents.retrievers.knowledge.main
    environment:
      SERVICE_BUS_SUBSCRIPTION: retriever-knowledge-sub
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - pharma-demo

  retriever-news:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharma-retriever-news
    env_file:
      - .env
    command: python -m src.agents.retrievers.news.main
    environment:
      SERVICE_BUS_SUBSCRIPTION: retriever-news-sub
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - pharma-demo

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: pharma-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    depends_on:
      planner:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - pharma-demo

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  pharma-demo:
    driver: bridge
