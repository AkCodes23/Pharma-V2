# ============================================================
# Pharma Agentic AI — Docker Compose (Production-Grade Local Stack)
# ============================================================
#
# Usage:
#   docker compose up -d              Start all services
#   docker compose up -d --build      Rebuild and start
#   docker compose logs -f planner    Follow planner logs
#   docker compose down -v            Stop and remove volumes
#
# Architecture:
#   planner (FastAPI:8000) → kafka → retrievers → postgres/redis → supervisor → executor
#   celery-worker handles PDF gen, RAG indexing, analytics
#   celery-beat schedules periodic tasks (RAG re-index, stale session cleanup)
#
# ============================================================

x-python-service: &python-service
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
    kafka:
      condition: service_healthy
  networks:
    - pharma-net

services:
  # ── Infrastructure Services ──────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: pharma-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --appendonly yes
        --requirepass ${REDIS_PASSWORD:-pharma_redis_2026}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-pharma_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharma-net

  postgres:
    image: postgres:16-alpine
    container_name: pharma-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pharma_ai
      POSTGRES_USER: pharma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharma_pg_2026}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma -d pharma_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharma-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: pharma-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharma-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pharma-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824  # 1GB
      KAFKA_NUM_PARTITIONS: 5
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - pharma-net

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pharma-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 5 --replication-factor 1 --topic pharma.tasks.legal
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 5 --replication-factor 1 --topic pharma.tasks.clinical
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 5 --replication-factor 1 --topic pharma.tasks.commercial
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 5 --replication-factor 1 --topic pharma.tasks.social
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 5 --replication-factor 1 --topic pharma.tasks.knowledge
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic pharma.events.sessions
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic pharma.events.audit
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic pharma.events.analytics
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic pharma.dlq
      echo 'All topics created.'
      kafka-topics --list --bootstrap-server kafka:29092
      "
    networks:
      - pharma-net

  # ── Monitoring & Admin ───────────────────────────────────

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: pharma-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: pharma-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pharma-net

  # ── Application Services ─────────────────────────────────

  planner:
    <<: *python-service
    container_name: pharma-planner
    ports:
      - "8000:8000"
    command: >
      uvicorn src.agents.planner.main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --log-level info
        --access-log
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - SERVICE_NAME=planner-agent
      - AGENT_ROLE=planner

  supervisor:
    <<: *python-service
    container_name: pharma-supervisor
    ports:
      - "8001:8001"
    command: >
      uvicorn src.agents.supervisor.main:app
        --host 0.0.0.0
        --port 8001
        --workers 1
        --log-level info
    environment:
      - SERVICE_NAME=supervisor-agent
      - AGENT_ROLE=supervisor

  executor:
    <<: *python-service
    container_name: pharma-executor
    ports:
      - "8002:8002"
    command: >
      uvicorn src.agents.executor.main:app
        --host 0.0.0.0
        --port 8002
        --workers 1
        --log-level info
    environment:
      - SERVICE_NAME=executor-agent
      - AGENT_ROLE=executor

  retriever-legal:
    <<: *python-service
    container_name: pharma-retriever-legal
    command: python -m src.agents.retrievers.legal.main
    environment:
      - SERVICE_NAME=retriever-legal
      - AGENT_MODULE=legal

  retriever-clinical:
    <<: *python-service
    container_name: pharma-retriever-clinical
    command: python -m src.agents.retrievers.clinical.main
    environment:
      - SERVICE_NAME=retriever-clinical
      - AGENT_MODULE=clinical

  retriever-commercial:
    <<: *python-service
    container_name: pharma-retriever-commercial
    command: python -m src.agents.retrievers.commercial.main
    environment:
      - SERVICE_NAME=retriever-commercial
      - AGENT_MODULE=commercial

  retriever-social:
    <<: *python-service
    container_name: pharma-retriever-social
    command: python -m src.agents.retrievers.social.main
    environment:
      - SERVICE_NAME=retriever-social
      - AGENT_MODULE=social

  retriever-knowledge:
    <<: *python-service
    container_name: pharma-retriever-knowledge
    command: python -m src.agents.retrievers.knowledge.main
    environment:
      - SERVICE_NAME=retriever-knowledge
      - AGENT_MODULE=knowledge

  # ── Background Workers ───────────────────────────────────

  celery-worker:
    <<: *python-service
    container_name: pharma-celery-worker
    command: >
      celery -A src.shared.infra.celery_app worker
        --loglevel=info
        --concurrency=4
        --queues=pharma.pdf,pharma.rag,pharma.analytics,celery
        --max-tasks-per-child=100
        --without-heartbeat
    environment:
      - SERVICE_NAME=celery-worker
      - C_FORCE_ROOT=1

  celery-beat:
    <<: *python-service
    container_name: pharma-celery-beat
    command: >
      celery -A src.shared.infra.celery_app beat
        --loglevel=info
        --schedule=/tmp/celerybeat-schedule
    environment:
      - SERVICE_NAME=celery-beat
      - C_FORCE_ROOT=1

  # ── Quality & Enhancement Agents (A2A) ───────────────────

  quality-evaluator:
    <<: *python-service
    container_name: pharma-quality-evaluator
    command: python -m src.agents.quality_evaluator.main
    environment:
      - SERVICE_NAME=quality-evaluator
      - AGENT_ROLE=quality_evaluator

  prompt-enhancer:
    <<: *python-service
    container_name: pharma-prompt-enhancer
    command: python -m src.agents.prompt_enhancer.main
    environment:
      - SERVICE_NAME=prompt-enhancer
      - AGENT_ROLE=prompt_enhancer

  # ── Frontend ─────────────────────────────────────────────

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: pharma-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://planner:8000
      - NEXT_PUBLIC_WS_URL=ws://planner:8000/ws
    depends_on:
      planner:
        condition: service_healthy
    networks:
      - pharma-net

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  zookeeper-data:
    driver: local
  kafka-data:
    driver: local

networks:
  pharma-net:
    driver: bridge
    name: pharma-network
